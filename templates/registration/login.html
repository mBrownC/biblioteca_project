{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="fw-bold text-center mb-4">Iniciar Sesión</h2>
                {% if form.errors %}
                <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" placeholder="Tu usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <input type="password" name="password" id="id_password" class="form-control" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePass()">👁</button>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">Entrar</button>
                    </div>
                </form>
                <p class="text-center mt-3 mb-0">
                    ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePass() {
    const input = document.getElementById('id_password');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
